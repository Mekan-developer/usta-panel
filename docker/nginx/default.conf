# ── HTTP: redirect to HTTPS + Let's Encrypt challenge ─────────────────────────
server {
    listen 80;
    server_name it-helper-tm.ru www.it-helper-tm.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name it-helper-tm.ru www.it-helper-tm.ru;

    ssl_certificate     /etc/letsencrypt/live/it-helper-tm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/it-helper-tm.ru/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    root  /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 55M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # WebSocket proxy for Reverb (wss://) ─────────────────────────────────────
    location ~ ^/app {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 60s;
    }

    # PHP-FPM ──────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass        app:9000;
        fastcgi_param       SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include             fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
    }

    # Static assets ────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires   1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
