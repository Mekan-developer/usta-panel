x-php-common: &php-common
  image: usta-panel:latest
  restart: unless-stopped
  env_file: .env
  networks:
    - usta

services:

  # ── Web (PHP-FPM) ────────────────────────────────────────────────────────────
  app:
    <<: *php-common
    build:
      context: .
      args:
        VITE_APP_NAME: "Usta panel"
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: it-helper-tm.ru
        VITE_REVERB_PORT: 443
        VITE_REVERB_SCHEME: https
    environment:
      CONTAINER_ROLE: app
      REDIS_HOST: redis
      DB_DATABASE: /var/www/html/storage/database.sqlite
      APP_URL: "https://it-helper-tm.ru"
    volumes:
      - app_public:/var/www/public
      - app_storage:/var/www/html/storage
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_started
    networks:
      - usta

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - usta

  # ── Horizon ──────────────────────────────────────────────────────────────────
  horizon:
    <<: *php-common
    command: ["php", "artisan", "horizon"]
    environment:
      REDIS_HOST: redis
      DB_DATABASE: /var/www/html/storage/database.sqlite
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  # ── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    <<: *php-common
    command: ["php", "artisan", "schedule:work"]
    environment:
      REDIS_HOST: redis
      DB_DATABASE: /var/www/html/storage/database.sqlite
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  # ── Reverb (WebSocket, internal only) ────────────────────────────────────────
  reverb:
    <<: *php-common
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    environment:
      REDIS_HOST: redis
      DB_DATABASE: /var/www/html/storage/database.sqlite
      REVERB_SERVER_HOST: "0.0.0.0"
      REVERB_SERVER_PORT: "8080"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - redis


volumes:
  app_public:
  app_storage:
  redis_data:

networks:
  usta:
    driver: bridge
