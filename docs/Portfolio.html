<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:#0b0d14; --bg2:#111420; --bg3:#181c2b;
      --bd:rgba(255,255,255,0.07); --tx:#dde1f0; --tx2:#7b7f9a;
      --acc:oklch(65% 0.22 265); --acc2:oklch(65% 0.22 185);
      --r:14px; --fh:'Sora',sans-serif; --fb:'DM Sans',sans-serif;
      --sh:0 8px 40px rgba(0,0,0,0.4); --sh2:0 2px 14px rgba(0,0,0,0.25);
    }
    [data-theme="light"] {
      --bg:#f0ede8; --bg2:#ffffff; --bg3:#e6e2db;
      --bd:rgba(0,0,0,0.07); --tx:#1a1c28; --tx2:#6b6d82;
      --sh:0 8px 40px rgba(0,0,0,0.08); --sh2:0 2px 14px rgba(0,0,0,0.05);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:16px;line-height:1.6;transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
    h1,h2,h3,h4{font-family:var(--fh);line-height:1.15}
    a{color:inherit} button,input,textarea{font-family:var(--fb)} button{cursor:pointer}
    .container{max-width:1100px;margin:0 auto;padding:0 28px}
    section{padding:96px 0}
    .sec-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
    .sec-title{font-size:clamp(1.9rem,3.5vw,2.55rem);font-weight:800;margin-bottom:48px}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s,border-color .3s,box-shadow .3s}
    nav.scrolled{background:color-mix(in oklch,var(--bg) 88%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);box-shadow:var(--sh2)}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-family:var(--fh);font-weight:800;font-size:1.15rem;letter-spacing:-.02em;text-decoration:none}
    .logo em{color:var(--acc);font-style:normal}
    .nav-links{display:flex;gap:30px;list-style:none}
    .nav-links a{text-decoration:none;color:var(--tx2);font-size:.875rem;font-weight:500;transition:color .18s}
    .nav-links a:hover{color:var(--tx)}
    .nav-r{display:flex;align-items:center;gap:9px}
    .lang-toggle{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px}
    .lang-toggle button{background:none;border:none;padding:4px 9px;font-size:.71rem;font-weight:700;color:var(--tx2);border-radius:5px;transition:all .18s;letter-spacing:.04em}
    .lang-toggle button.act{background:var(--acc);color:#fff}
    .icon-btn{background:var(--bg3);border:1px solid var(--bd);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .18s}
    .icon-btn:hover{border-color:var(--acc);color:var(--acc)}

    /* HERO */
    #hero{min-height:100vh;display:flex;align-items:center;padding-top:64px;position:relative;overflow:hidden}
    #hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,var(--bd) 1px,transparent 1px);background-size:30px 30px;pointer-events:none}
    #hero::after{content:'';position:absolute;top:15%;right:5%;width:520px;height:520px;background:radial-gradient(circle,oklch(65% .22 265/.07) 0%,transparent 65%);pointer-events:none}
    .hero-grid{display:grid;grid-template-columns:1fr 360px;gap:60px;align-items:center;position:relative}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bd);background:var(--bg2);padding:6px 14px;border-radius:100px;font-size:.78rem;font-weight:500;color:var(--tx2);margin-bottom:20px}
    .hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--acc2);animation:blink 2.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.82)}}
    .hero-name{font-size:clamp(2.8rem,5.5vw,4.1rem);font-weight:800;letter-spacing:-.035em;line-height:1.07;margin-bottom:10px}
    .hero-name .grad{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-role{font-size:1.05rem;color:var(--tx2);font-weight:400;margin-bottom:16px;font-family:var(--fh)}
    .hero-bio{color:var(--tx2);max-width:490px;line-height:1.75;margin-bottom:32px;font-size:.96rem}
    .hero-btns{display:flex;gap:12px;margin-bottom:34px;flex-wrap:wrap}
    .btn-p{background:var(--acc);color:#fff;border:none;padding:13px 26px;border-radius:10px;font-size:.9rem;font-weight:600;transition:opacity .18s,transform .18s;text-decoration:none;display:inline-block}
    .btn-p:hover{opacity:.88;transform:translateY(-1px)}
    .btn-o{background:transparent;color:var(--tx);border:1px solid var(--bd);padding:13px 26px;border-radius:10px;font-size:.9rem;font-weight:600;transition:all .18s;text-decoration:none;display:inline-block}
    .btn-o:hover{border-color:var(--acc);color:var(--acc)}
    .socials{display:flex;gap:10px}
    .soc-lnk{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx2);text-decoration:none;transition:all .18s}
    .soc-lnk:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-2px)}
    .photo-wrap{display:flex;align-items:center;justify-content:center;position:relative}
    .photo-ring{width:290px;height:290px;border-radius:50%;border:1.5px solid var(--acc);padding:5px;position:relative}
    .photo-core{width:100%;height:100%;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .photo-glow{position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,oklch(65% .22 265/.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

    /* SKILLS */
    #skills{background:var(--bg2)}
    .skill-tabs{display:flex;gap:7px;margin-bottom:34px;flex-wrap:wrap}
    .sk-tab{background:var(--bg3);border:1px solid var(--bd);padding:9px 20px;border-radius:100px;font-size:.84rem;font-weight:600;color:var(--tx2);transition:all .18s}
    .sk-tab.act{background:var(--acc);border-color:var(--acc);color:#fff}
    .sk-tab:hover:not(.act){border-color:var(--tx2);color:var(--tx)}
    .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:13px}
    .sk-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:18px;transition:border-color .2s,transform .2s,box-shadow .2s}
    .sk-card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:var(--sh2)}
    .sk-abbr{width:40px;height:40px;border-radius:10px;background:oklch(65% .22 265/.1);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:var(--acc);margin-bottom:12px;letter-spacing:-.01em;font-family:var(--fh)}
    .sk-name{font-weight:600;font-size:.88rem;margin-bottom:10px}
    .bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
    .sk-pct{font-size:.72rem;color:var(--tx2);text-align:right;margin-top:4px}

    /* TIMELINE */
    .tl-wrap{position:relative}
    .tl-wrap::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:linear-gradient(180deg,transparent 0%,var(--acc) 8%,var(--acc) 92%,transparent 100%);transform:translateX(-50%)}
    .tl-row{display:grid;grid-template-columns:1fr 48px 1fr;gap:0 16px;margin-bottom:40px;align-items:start}
    .tl-side-l{text-align:right}
    .tl-mid{display:flex;justify-content:center;padding-top:18px}
    .tl-dot{width:13px;height:13px;border-radius:50%;background:var(--acc);border:2px solid var(--bg);box-shadow:0 0 0 4px oklch(65% .22 265/.2);flex-shrink:0}
    .tl-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px 22px;transition:border-color .2s}
    .tl-card:hover{border-color:var(--acc)}
    .tl-co{font-size:.71rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
    .tl-role{font-weight:700;font-family:var(--fh);font-size:.97rem;margin-bottom:3px}
    .tl-dur{font-size:.78rem;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;gap:5px}
    .tl-desc{font-size:.85rem;color:var(--tx2);line-height:1.65}
    .show-mob{display:none}

    /* PROJECTS */
    #projects{background:var(--bg2)}
    .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:20px}
    .proj-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .22s,transform .22s,box-shadow .22s}
    .proj-card:hover{border-color:var(--acc);transform:translateY(-4px);box-shadow:var(--sh)}
    .lock-ov{position:absolute;inset:0;background-color:var(--bg3);background-image:repeating-linear-gradient(45deg,transparent,transparent 12px,var(--bd) 12px,var(--bd) 13px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background-color .2s}
    .lock-ov:hover{background-color:oklch(65% .22 265/.06)}
    .proj-body{padding:18px 20px}
    .proj-badge{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:3px 9px;border-radius:100px;margin-bottom:10px}
    .badge-pub{background:oklch(65% .22 185/.12);color:var(--acc2)}
    .badge-priv{background:oklch(65% .22 265/.12);color:var(--acc)}
    .proj-title{font-weight:700;font-family:var(--fh);font-size:1rem;margin-bottom:7px}
    .proj-desc{font-size:.84rem;color:var(--tx2);line-height:1.65;margin-bottom:14px}
    .tech-list{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .tech-pill{font-size:.69rem;font-weight:600;padding:2px 9px;background:var(--bg3);border-radius:6px;color:var(--tx2)}
    .proj-link{font-size:.84rem;font-weight:600;color:var(--acc);text-decoration:none}
    .proj-link:hover{text-decoration:underline}

    /* CAROUSEL */
    .proj-car{position:relative;height:186px;overflow:hidden;background:var(--bg3)}
    .car-track{display:flex;height:100%;transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform}
    .car-slide{flex-shrink:0;width:100%;height:100%;position:relative}
    .car-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.52);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);color:#fff;width:30px;height:30px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;opacity:0;transition:opacity .18s;z-index:5}
    .proj-car:hover .car-arr{opacity:1}
    .car-prev{left:8px} .car-next{right:8px}
    .car-arr:hover{background:rgba(0,0,0,.78)}
    .car-dots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
    .car-dot{width:5px;height:5px;border-radius:3px;background:rgba(255,255,255,.4);border:none;padding:0;cursor:pointer;transition:all .22s}
    .car-dot.act{width:14px;background:#fff}
    .car-lbl{position:absolute;top:9px;right:9px;z-index:5;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);color:rgba(255,255,255,.75);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase}

    /* PROJECT DETAIL MODAL */
    .pdm-bg{align-items:flex-end;padding:0}
    @media(min-width:640px){.pdm-bg{align-items:center;padding:20px}}
    .pdm{background:var(--bg2);border:1px solid var(--bd);border-radius:20px 20px 0 0;width:100%;max-width:800px;max-height:93vh;overflow-y:auto;animation:mdUp .28s ease;position:relative}
    @media(min-width:640px){.pdm{border-radius:20px}}
    .pdm-close-row{position:sticky;top:0;z-index:20;display:flex;justify-content:flex-end;padding:12px 14px 0}
    .pdm-close-btn{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);color:#fff;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.82rem;cursor:pointer;transition:background .15s}
    .pdm-close-btn:hover{background:rgba(0,0,0,.82)}
    .pdm-img-wrap{position:relative;background:var(--bg3);margin-top:-42px}
    .pdm-main{position:relative;height:280px;overflow:hidden}
    @media(min-width:640px){.pdm-main{height:340px}}
    .pdm-track{display:flex;height:100%;transition:transform .38s cubic-bezier(.4,0,.2,1)}
    .pdm-slide{flex-shrink:0;width:100%;height:100%;position:relative}
    .pdm-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);color:#fff;width:36px;height:36px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:1.35rem;line-height:1;cursor:pointer;z-index:5;transition:background .15s}
    .pdm-arr:hover{background:rgba(0,0,0,.82)}
    .pdm-arr-l{left:12px} .pdm-arr-r{right:12px}
    .pdm-thumbs{display:flex;gap:8px;padding:10px 14px;background:rgba(0,0,0,.48);backdrop-filter:blur(8px)}
    .pdm-tn{flex:1;height:54px;border-radius:6px;overflow:hidden;border:2px solid transparent;cursor:pointer;position:relative;transition:border-color .18s;background:none;padding:0}
    .pdm-tn.act{border-color:var(--acc)}
    .pdm-tn-label{position:absolute;bottom:0;left:0;right:0;font-size:.58rem;font-weight:700;color:rgba(255,255,255,.82);background:rgba(0,0,0,.62);text-align:center;padding:2px 0;letter-spacing:.04em;text-transform:uppercase}
    .pdm-body{padding:22px 24px 32px}
    .pdm-title{font-family:var(--fh);font-size:clamp(1.3rem,3vw,1.7rem);font-weight:800;margin:8px 0 10px}
    .pdm-desc{color:var(--tx2);line-height:1.75;margin-bottom:18px;font-size:.94rem}
    .pdm-open{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#fff;padding:12px 22px;border-radius:10px;font-size:.9rem;font-weight:600;text-decoration:none;transition:opacity .18s,transform .18s}
    .pdm-open:hover{opacity:.88;transform:translateY(-1px)}

    /* CONTACT */
    .contact-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:60px;align-items:start}
    .ci-title{font-family:var(--fh);font-size:1.35rem;font-weight:700;margin-bottom:12px}
    .ci-desc{color:var(--tx2);line-height:1.75;margin-bottom:28px;font-size:.94rem}
    .ci-list{display:flex;flex-direction:column;gap:13px;margin-bottom:26px}
    .ci-row{display:flex;align-items:center;gap:13px}
    .ci-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;background:var(--bg3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--acc)}
    .ci-val{font-size:.88rem;font-weight:500} .ci-lbl{font-size:.72rem;color:var(--tx2)}
    .fg{margin-bottom:15px}
    .fl{display:block;font-size:.77rem;font-weight:700;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
    .fi{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:12px 15px;font-size:.88rem;color:var(--tx);outline:none;transition:border-color .18s}
    .fi:focus{border-color:var(--acc)}
    textarea.fi{min-height:112px;resize:vertical}

    /* MODAL (password) */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;animation:mdIn .2s ease}
    @keyframes mdIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:32px;max-width:380px;width:92%;box-shadow:var(--sh);position:relative;animation:mdUp .22s ease}
    @keyframes mdUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .modal-x{position:absolute;top:14px;right:14px;background:var(--bg3);border:none;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:.8rem;transition:color .15s}
    .modal-x:hover{color:var(--tx)}
    .modal-h{font-family:var(--fh);font-size:1.2rem;font-weight:700;margin-bottom:5px}
    .modal-s{font-size:.85rem;color:var(--tx2);margin-bottom:20px}
    .modal-err{font-size:.79rem;color:#f87171;margin-top:5px}

    /* ADMIN */
    .adm-h4{font-size:.77rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:9px}
    .adm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:8px;margin-bottom:7px;gap:10px}
    .adm-name{font-size:.86rem;font-weight:600}
    .adm-btn{background:none;border:none;font-size:.76rem;color:var(--acc);font-weight:600}

    /* TWEAKS */
    .tp{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;width:210px;box-shadow:var(--sh);animation:mdUp .2s ease}
    .tp-head{font-family:var(--fh);font-weight:700;font-size:.88rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
    .tp-x{background:none;border:none;color:var(--tx2);font-size:1rem;line-height:1}
    .tp-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin-bottom:8px}
    .tp-swatches{display:flex;gap:7px;margin-bottom:14px}
    .tp-swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
    .tp-swatch.sel{border-color:var(--tx);transform:scale(1.18)}

    /* FOOTER */
    footer{padding:34px 0;border-top:1px solid var(--bd)}
    .foot-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .foot-copy{font-size:.8rem;color:var(--tx2)}
    .foot-admin{background:none;border:none;font-size:.72rem;color:var(--tx2);opacity:.3;display:flex;align-items:center;gap:4px;transition:opacity .2s}
    .foot-admin:hover{opacity:.85}

    /* ANIM */
    .fade-up{animation:fadeUp .55s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .d1{animation-delay:.08s} .d2{animation-delay:.16s} .d3{animation-delay:.24s} .d4{animation-delay:.32s}

    /* RESPONSIVE */
    @media(max-width:920px){
      .hero-grid{grid-template-columns:1fr;text-align:center}
      .hero-bio{margin-left:auto;margin-right:auto}
      .hero-btns,.socials{justify-content:center}
      .photo-wrap{order:-1} .photo-ring{width:200px;height:200px}
      .tl-wrap::before{left:21px}
      .tl-row{grid-template-columns:42px 1fr}
      .tl-side-l{display:none} .show-mob{display:block}
      .contact-grid{grid-template-columns:1fr;gap:36px}
      .nav-links{display:none}
    }
    @media(max-width:600px){
      section{padding:64px 0}
      .proj-grid{grid-template-columns:1fr}
      .skills-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ═══ TRANSLATIONS ═══ */

/* ═══ NAVBAR ═══ */
function Navbar({ lang, setLang, theme, setTheme, t }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <nav className={scrolled ? 'scrolled' : ''}>
      <div className="container">
        <div className="nav-inner">
          <a href="#hero" className="logo">alex<em>.</em>dev</a>
          <ul className="nav-links">
            {['skills','timeline','projects','contact'].map(k => (
              <li key={k}><a href={'#'+k}>{t.nav[k]}</a></li>
            ))}
          </ul>
          <div className="nav-r">
            <div className="lang-toggle">
              {['en','ru','uz'].map(l => (
                <button key={l} className={lang===l?'act':''} onClick={() => setLang(l)}>{l.toUpperCase()}</button>
              ))}
            </div>
            <button className="icon-btn" onClick={() => setTheme(theme==='dark'?'light':'dark')}>
              {theme==='dark' ? Ico.sun : Ico.moon}
            </button>
          </div>
        </div>
      </div>
    </nav>
  );
}

/* ═══ SKILLS ═══ */
function Skills({ t }) {
  const tabKeys = ['frontend','backend','tools'];
  const [active, setActive] = useState('frontend');
  const [animated, setAnimated] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setAnimated(true); }, {threshold:0.15});
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  useEffect(() => {
    setAnimated(false);
    const id = setTimeout(() => setAnimated(true), 60);
    return () => clearTimeout(id);
  }, [active]);
  return (
    <section id="skills" ref={ref}>
      <div className="container">
        <div className="sec-label">{t.skills.label}</div>
        <h2 className="sec-title">{t.skills.title}</h2>
        <div className="skill-tabs">
          {tabKeys.map((k,i) => (
            <button key={k} className={'sk-tab'+(active===k?' act':'')} onClick={() => setActive(k)}>{t.skills.tabs[i]}</button>
          ))}
        </div>
        <div className="skills-grid">
          {SKILLS[active].map((sk,i) => (
            <div className="sk-card" key={sk.name} style={{animationDelay:i*0.04+'s'}}>
              <div className="sk-abbr">{sk.a}</div>
              <div className="sk-name">{sk.name}</div>
              <div className="bar-bg"><div className="bar-fill" style={{width:animated?sk.p+'%':'0%'}}></div></div>
              <div className="sk-pct">{sk.p}%</div>
            </div>
          ))}
        </div>
      </div>

/* ═══ TIMELINE ═══ */
function Timeline({ lang, t }) {
  return (
    <section id="timeline">
      <div className="container">
        <div className="sec-label">{t.tl.label}</div>
        <h2 className="sec-title">{t.tl.title}</h2>
        <div className="tl-wrap">
          {TIMELINE.map((item, i) => {
            const isLeft = i % 2 === 0;
            const card = (
              <div className="tl-card">
                <div className="tl-co">{item.co}</div>
                <div className="tl-role">{item.role[lang]||item.role.en}</div>
                <div className="tl-dur">{Ico.clock}{item.dur}</div>
                <div className="tl-desc">{item.desc[lang]||item.desc.en}</div>
              </div>
            );
            return (
              <div className="tl-row" key={i}>
                <div className="tl-side-l">{isLeft && <div style={{display:'flex',justifyContent:'flex-end'}}>{card}</div>}</div>
                <div className="tl-mid"><div className="tl-dot"></div></div>
                <div className="tl-side-r">
                  {!isLeft && card}
                  {isLeft && <div className="show-mob">{card}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

/* ═══ PASSWORD MODAL ═══ */
function PasswordModal({ project, t, onClose, onUnlock }) {
  const [val, setVal] = useState('');
  const [err, setErr] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    const p = localStorage.getItem('proj_pass_'+project.id) || localStorage.getItem('portfolio_global_pass') || 'demo1234';
    if (val === p) { onUnlock(project.id); onClose(); }
    else { setErr(true); setVal(''); }
  };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}>✕</button>
        <div style={{fontSize:'2rem',marginBottom:'10px'}}>🔒</div>
        <div className="modal-h">{t.pass.title}</div>
        <div className="modal-s">{t.pass.sub}</div>
        <form onSubmit={submit}>
          <input className="fi" type="password" placeholder={t.pass.ph} value={val} autoFocus
            onChange={e => { setVal(e.target.value); setErr(false); }} style={{marginBottom:'4px',width:'100%'}}/>
          {err && <div className="modal-err">{t.pass.err}</div>}
          <button type="submit" className="btn-p" style={{width:'100%',marginTop:'14px'}}>{t.pass.btn}</button>
        </form>
      </div>
    </div>
  );
}

/* ═══ ADMIN PANEL ═══ */
function AdminProjRow({ proj, t }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(localStorage.getItem('proj_pass_'+proj.id)||'');
  const [saved, setSaved] = useState(false);
  const save = () => { localStorage.setItem('proj_pass_'+proj.id, val); setSaved(true); setEditing(false); setTimeout(()=>setSaved(false),2500); };
  return (
    <div className="adm-row" style={{flexWrap:'wrap'}}>
      <span className="adm-name">{proj.title}</span>
      {!editing
        ? <button className="adm-btn" onClick={()=>setEditing(true)}>{saved?t.admin.saved:t.admin.change}</button>
        : <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <input className="fi" type="text" placeholder={t.admin.np} value={val} onChange={e=>setVal(e.target.value)} style={{width:'120px',padding:'5px 10px',fontSize:'0.78rem'}}/>
            <button className="btn-p" style={{padding:'5px 12px',fontSize:'0.78rem'}} onClick={save}>{t.admin.save}</button>
          </div>
      }
    </div>
  );
}

function ImageCarousel({ screens, isLocked, onLockClick, t }) {
  const [idx, setIdx] = useState(0);
  const tsRef = useRef(null);
  const prev = (e) => { e.stopPropagation(); setIdx(i => (i-1+screens.length)%screens.length); };
  const next = (e) => { e.stopPropagation(); setIdx(i => (i+1)%screens.length); };
  const onTS = (e) => { tsRef.current = e.touches[0].clientX; };
  const onTE = (e) => {
    if (tsRef.current===null) return;
    const diff = tsRef.current - e.changedTouches[0].clientX;
    if (Math.abs(diff)>40) setIdx(i => diff>0?(i+1)%screens.length:(i-1+screens.length)%screens.length);
    tsRef.current = null;
  };
  if (isLocked) {
    return (
      <div className="proj-car">
        <div className="lock-ov" onClick={onLockClick}>
          {Ico.lock}
          <span style={{fontSize:'0.77rem',color:'var(--tx2)',fontWeight:600}}>{t.proj.locked}</span>
          <span style={{fontSize:'0.7rem',color:'var(--acc)',fontWeight:600}}>{t.proj.unlock}</span>
        </div>
      </div>
    );
  }
  return (
    <div className="proj-car" onTouchStart={onTS} onTouchEnd={onTE}>
      <div className="car-track" style={{transform:'translateX(-'+(idx*100)+'%)'}}>
        {screens.map((s,i) => (
          <div className="car-slide" key={i}><WireframeScreen variant={s.variant} bg={s.bg} ac={s.ac}/></div>
        ))}
      </div>
      {screens.length>1 && <>
        <button className="car-arr car-prev" onClick={prev}>&#8249;</button>
        <button className="car-arr car-next" onClick={next}>&#8250;</button>
        <div className="car-dots">
          {screens.map((_,i) => (
            <button key={i} className={'car-dot'+(i===idx?' act':'')} onClick={e=>{e.stopPropagation();setIdx(i);}}/>
          ))}
        </div>
      </>}
      <div className="car-lbl">{screens[idx].label}</div>
    </div>
  );
}

/* ═══ PROJECT DETAIL MODAL ═══ */
function ProjectModal({ proj, lang, t, onClose }) {
  const [idx, setIdx] = useState(0);
  const tsRef = useRef(null);
  useEffect(() => {
    const h = (e) => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, [onClose]);
  const prev = () => setIdx(i => (i-1+proj.screens.length)%proj.screens.length);
  const next = () => setIdx(i => (i+1)%proj.screens.length);
  const onTS = (e) => { tsRef.current = e.touches[0].clientX; };
  const onTE = (e) => {
    if (tsRef.current===null) return;
    const diff = tsRef.current - e.changedTouches[0].clientX;
    if (Math.abs(diff)>40) { diff>0 ? next() : prev(); }
    tsRef.current = null;
  };
  return (
    <div className="modal-bg pdm-bg" onClick={onClose}>
      <div className="pdm" onClick={e=>e.stopPropagation()}>
        <div className="pdm-close-row">
          <button className="pdm-close-btn" onClick={onClose}>&#x2715;</button>
        </div>
        <div className="pdm-img-wrap">
          <div className="pdm-main" onTouchStart={onTS} onTouchEnd={onTE}>
            <div className="pdm-track" style={{transform:'translateX(-'+(idx*100)+'%)'}}>
              {proj.screens.map((s,i) => (
                <div className="pdm-slide" key={i}><WireframeScreen variant={s.variant} bg={s.bg} ac={s.ac}/></div>
              ))}
            </div>
            <button className="pdm-arr pdm-arr-l" onClick={e=>{e.stopPropagation();prev();}}>&#8249;</button>
            <button className="pdm-arr pdm-arr-r" onClick={e=>{e.stopPropagation();next();}}>&#8250;</button>
          </div>
          <div className="pdm-thumbs">
            {proj.screens.map((s,i) => (
              <button key={i} className={'pdm-tn'+(i===idx?' act':'')} onClick={()=>setIdx(i)}>
                <WireframeScreen variant={s.variant} bg={s.bg} ac={s.ac}/>
                <div className="pdm-tn-label">{s.label}</div>
              </button>
            ))}
          </div>
        </div>
        <div className="pdm-body">
          <span className={'proj-badge '+(proj.type==='public'?'badge-pub':'badge-priv')}>
            {proj.type==='public'?t.proj.pub:t.proj.priv}
          </span>
          <div className="pdm-title">{proj.title}</div>
          <p className="pdm-desc">{proj.desc[lang]||proj.desc.en}</p>
          <div className="tech-list" style={{marginBottom:'22px'}}>
            {proj.tech.map(tc => <span className="tech-pill" key={tc}>{tc}</span>)}
          </div>
          <a href={proj.link} className="pdm-open" target="_blank" rel="noopener noreferrer">
            {Ico.extlnk}{t.proj.openApp}
          </a>
        </div>
      </div>
    </div>
  );
}

/* ═══ PROJECTS ═══ */
function Projects({ lang, t }) {
  const [unlocked, setUnlocked] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pf_unlocked')||'[]'); } catch(e) { return []; }
  });
  const [passModal,   setPassModal]   = useState(null);
  const [detailModal, setDetailModal] = useState(null);
  const handleUnlock = (id) => {
    const next = [...unlocked, id];
    setUnlocked(next);
    localStorage.setItem('pf_unlocked', JSON.stringify(next));
  };
  return (
    <section id="projects">
      <div className="container">
        <div className="sec-label">{t.proj.label}</div>
        <h2 className="sec-title">{t.proj.title}</h2>
        <div className="proj-grid">
          {PROJECTS.map(proj => {
            const isLocked = proj.type==='private' && !unlocked.includes(proj.id);
            return (
              <div className="proj-card" key={proj.id}
                style={{cursor:isLocked?'default':'pointer'}}
                onClick={() => { if (!isLocked) setDetailModal(proj); }}>
                <ImageCarousel screens={proj.screens} isLocked={isLocked} t={t}
                  onLockClick={e => { e.stopPropagation(); setPassModal(proj); }}/>
                <div className="proj-body">
                  <span className={'proj-badge '+(proj.type==='public'?'badge-pub':'badge-priv')}>
                    {proj.type==='public'?t.proj.pub:t.proj.priv}
                  </span>
                  <div className="proj-title">{proj.title}</div>
                  <div className="proj-desc">{proj.desc[lang]||proj.desc.en}</div>
                  <div className="tech-list">{proj.tech.map(tc=><span className="tech-pill" key={tc}>{tc}</span>)}</div>
                  {!isLocked && (
                    <button className="proj-link" style={{background:'none',border:'none',padding:0}}
                      onClick={e=>{e.stopPropagation();setDetailModal(proj);}}>
                      {t.proj.view}
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {passModal   && <PasswordModal project={passModal} t={t} onClose={()=>setPassModal(null)} onUnlock={handleUnlock}/>}
      {detailModal && <ProjectModal proj={detailModal} lang={lang} t={t} onClose={()=>setDetailModal(null)}/>}
    </section>
  );
}

/* ═══ CONTACT ═══ */
function Contact({ t }) {
  const [form, setForm] = useState({name:'',email:'',msg:''});
  const [sent, setSent] = useState(false);
  const upd = e => setForm({...form,[e.target.name]:e.target.value});
  const submit = (e) => { e.preventDefault(); setSent(true); setForm({name:'',email:'',msg:''}); setTimeout(()=>setSent(false),3500); };
  const contacts = [
    {icon:Ico.mail,  val:'hello@alexjohnson.dev', lbl:t.contact.el},
    {icon:Ico.phone, val:'+1 (555) 123-4567',     lbl:t.contact.pl},
    {icon:Ico.pin,   val:'San Francisco, CA',      lbl:t.contact.ll},
  ];
  return (
    <section id="contact">
      <div className="container">
        <div className="sec-label">{t.contact.label}</div>
        <h2 className="sec-title">{t.contact.title}</h2>
        <div className="contact-grid">
          <div>
            <div className="ci-title">{t.contact.title}</div>
            <p className="ci-desc">{t.contact.desc}</p>
            <div className="ci-list">
              {contacts.map(c => (
                <div className="ci-row" key={c.lbl}>
                  <div className="ci-icon">{c.icon}</div>
                  <div><div className="ci-val">{c.val}</div><div className="ci-lbl">{c.lbl}</div></div>
                </div>
              ))}
            </div>
            <div className="socials">
              <a href="#" className="soc-lnk">{Ico.github}</a>
              <a href="#" className="soc-lnk">{Ico.li}</a>
              <a href="#" className="soc-lnk">{Ico.tw}</a>
            </div>
          </div>
          <form onSubmit={submit}>
            <div className="fg"><label className="fl">{t.contact.nf}</label><input className="fi" name="name" value={form.name} onChange={upd} required/></div>
            <div className="fg"><label className="fl">{t.contact.ef}</label><input className="fi" name="email" type="email" value={form.email} onChange={upd} required/></div>
            <div className="fg"><label className="fl">{t.contact.mf}</label><textarea className="fi" name="msg" value={form.msg} onChange={upd} required></textarea></div>
            <button type="submit" className="btn-p" style={{width:'100%',fontSize:'0.92rem'}}>{sent?'✓ Sent!':t.contact.send}</button>
          </form>
        </div>
      </div>
    </section>
  );
}

/* ═══ TWEAKS ═══ */
function TweaksPanel({ open, onClose, accentId, setAccentId }) {
  if (!open) return null;
  return (
    <div className="tp">
      <div className="tp-head"><span>Tweaks</span><button className="tp-x" onClick={onClose}>✕</button></div>
      <div className="tp-lbl">Accent Color</div>
      <div className="tp-swatches">
        {ACCENTS.map(ac => (
          <div key={ac.id} className={'tp-swatch'+(accentId===ac.id?' sel':'')}
            style={{background:'linear-gradient(135deg,'+ac.a+','+ac.b+')'}}
            onClick={()=>setAccentId(ac.id)}></div>
        ))}
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentId": "indigo",
  "theme": "dark"
}/*EDITMODE-END*/;

function App() {
  const [theme,    setTheme]    = useState(() => localStorage.getItem('pf_theme')  || TWEAK_DEFAULTS.theme);
  const [lang,     setLang]     = useState(() => localStorage.getItem('pf_lang')   || 'en');
  const [accentId, setAccentId] = useState(() => localStorage.getItem('pf_accent') || TWEAK_DEFAULTS.accentId);
  const [adminOpen,  setAdminOpen]  = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const t = LANGS[lang] || LANGS.en;
  const accent = ACCENTS.find(a=>a.id===accentId) || ACCENTS[0];

  useEffect(() => { document.documentElement.setAttribute('data-theme',theme); localStorage.setItem('pf_theme',theme); }, [theme]);
  useEffect(() => { document.documentElement.lang=lang; localStorage.setItem('pf_lang',lang); }, [lang]);
  useEffect(() => {
    document.documentElement.style.setProperty('--acc',  accent.a);
    document.documentElement.style.setProperty('--acc2', accent.b);
    localStorage.setItem('pf_accent', accentId);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentId,theme}},'*');
  }, [accentId, theme]);
  useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', h);
  }, []);
  const closeTweaks = () => { setTweaksOpen(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); };

  return (
    <>
      <Navbar lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} t={t}/>
      <Hero t={t}/>
      <Skills t={t}/>
      <Timeline lang={lang} t={t}/>
      <Projects lang={lang} t={t}/>
      <Contact t={t}/>
      <footer>
        <div className="container">
          <div className="foot-inner">
            <span className="foot-copy">{t.footer.copy}</span>
            <button className="foot-admin" onClick={()=>setAdminOpen(true)}>
              {Ico.gear}<span>{t.footer.admin}</span>
            </button>
          </div>
        </div>
      </footer>
      {adminOpen  && <AdminPanel t={t} onClose={()=>setAdminOpen(false)}/>}
      <TweaksPanel open={tweaksOpen} onClose={closeTweaks} accentId={accentId} setAccentId={setAccentId}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
