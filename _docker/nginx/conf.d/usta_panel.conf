# 1. Редирект с HTTP (80) на HTTPS (443)
server {
    listen 80;
    server_name it-helper-tm.ru www.it-helper-tm.ru;

    return 301 https://$host$request_uri;
}

# 2. Основной блок HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name it-helper-tm.ru www.it-helper-tm.ru;
    error_page 497 =301 https://$host:8443$request_uri;

    root /var/www/usta_panel/public;
    index index.php index.html;

    # Настройки SSL-сертификатов (пути внутри контейнера Nginx)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Базовая оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Логи (очень помогут, если что-то пойдет не так)
    access_log /var/log/nginx/usta_panel_access.log;
    error_log /var/log/nginx/usta_panel_error.log;

    # Безопасность: запрещаем загрузку сайта во фреймах, скрываем версию Nginx
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    server_tokens off;

    # Главный роутинг Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Отключаем логи для иконок и роботов, чтобы не забивать сервер
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Ограничение на размер загружаемых файлов (например, для фоток на доске объявлений)
    client_max_body_size 32M;

    # Обработка PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Дополнительные настройки для стабильности fastcgi
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 4 32k;
    }

    # Запрещаем доступ к скрытым файлам (например, .env или .git)
    location ~ /\.ht {
        deny all;
    }
}
